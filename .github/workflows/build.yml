name: build

on:
  pull_request:
    paths:
      - 'web/**'
      - 'lambda/**'
      - 'terraform/**'

jobs:
  test-lambda:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda/security-headers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lambda/security-headers/package-lock.json
      - run: npm ci
      - run: npm test

  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
