name: publish

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'lambda/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-lambda:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda/security-headers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lambda/security-headers/package-lock.json
      - run: npm ci
      - run: npm test

  publish:
    needs: test-lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync web/ to S3
        run: aws s3 sync web/ s3://${{ secrets.ASSETS_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Output CDN URL
        run: echo "🌐 Deploy listo — https://d14x2vaw9f2mo1.cloudfront.net"
